<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Inventory Atelier · History</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div class="app-shell app-shell-dashboard">
    <header class="dashboard-hero dashboard-hero-minimal">
      <nav class="segment-shell top-nav" aria-label="Inventory pages">
        <a class="segment-btn" href="/">On Hand</a>
        <a class="segment-btn segment-btn-active" href="/history.html">History</a>
      </nav>
      <div id="summary" class="dashboard-summary"></div>
    </header>

    <section class="panel-card history-card inventory-panel">
      <div class="section-head">
        <div>
          <div class="section-kicker">History</div>
          <h2>Sold and traded watches</h2>
        </div>
        <button id="refreshBtn" class="ghost-btn">Refresh</button>
      </div>
      <div id="historyList" class="inventory-list history-list"></div>
    </section>
  </div>

  <div id="editorModal" class="modal-shell hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <section class="modal-card editor-card">
      <div class="section-head modal-head editor-head">
        <div>
          <div class="section-kicker">Watch editor</div>
          <h2 id="editorTitle">Edit Details</h2>
        </div>
        <button id="closeEditorBtn" class="editor-close-btn" type="button">×</button>
      </div>
      <form id="watchForm" class="watch-form editor-form">
        <input type="hidden" name="id" />

        <div class="editor-section">
          <div class="field-grid editor-field-grid editor-field-grid-top">
            <label><span>Status</span>
              <select name="status" id="statusField">
                <option value="on_hand">On hand</option>
                <option value="pending">Pending</option>
                <option value="sold">Sold</option>
                <option value="traded">Traded</option>
              </select>
            </label>
            <label><span>Acquisition</span>
              <select name="acquisition_type" id="acquisitionField">
                <option value="purchase">Purchase</option>
                <option value="trade">Trade</option>
                              </select>
            </label>
          </div>
        </div>

        <div class="editor-section">
          <label><span>Brand &amp; Model</span></label>
          <div class="field-grid editor-field-grid editor-brand-model-grid">
            <label><input name="brand" required placeholder="Brand" /></label>
            <label class="editor-model-field"><input name="model" required placeholder="Model" /></label>
          </div>
        </div>

        <div class="editor-section">
          <label><span>Display name</span><input name="display_name" placeholder="Optional card title override" /></label>
        </div>

        <div class="editor-section">
          <label><span>Reference number</span><input name="reference" placeholder="Reference" /></label>
        </div>

        <div class="editor-section">
          <div class="editor-upload-head">
            <label><span>Cover image</span></label>
            <span class="editor-upload-link">replace</span>
          </div>
          <label class="editor-upload-box"><input id="imageUploadField" name="cover_upload" type="file" accept="image/*" /><span>Choose image</span></label>
        </div>

        <div class="editor-section field-grid editor-field-grid">
          <label><span>Factory</span><input name="factory" /></label>
          <label><span>Value</span><input name="paid_value" type="number" step="0.01" /></label>
        </div>

        <div id="conditionalFields" class="field-grid conditional-fields editor-field-grid"></div>

        <div class="editor-section">
          <label><span>Notes</span><textarea name="notes" rows="4"></textarea></label>
        </div>

        <div id="uploadStatus" class="form-status"></div>
        <div class="modal-actions editor-actions">
          <button id="cancelEditorBtn" type="button" class="ghost-btn editor-secondary-btn">Cancel</button>
          <button type="submit" class="primary-btn editor-primary-btn">Save Changes</button>
        </div>
        <div id="formStatus" class="form-status"></div>
      </form>
    </section>
  </div>

  <div id="disposeModal" class="modal-shell hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-dispose-modal="true"></div>
    <section class="modal-card editor-card">
      <div class="section-head modal-head editor-head">
        <div>
          <div class="section-kicker">Disposition</div>
          <h2 id="disposeTitle">Sell or Trade Watch</h2>
        </div>
        <button id="closeDisposeBtn" class="editor-close-btn" type="button">×</button>
      </div>
      <form id="disposeForm" class="watch-form editor-form">
        <div class="editor-section">
          <div class="dispose-mode-row">
            <button id="sellModeBtn" type="button" class="catalog-action-btn catalog-edit-btn dispose-mode-btn">Sell</button>
            <button id="tradeModeBtn" type="button" class="catalog-action-btn catalog-action-btn-primary dispose-mode-btn">Trade</button>
          </div>
        </div>
        <div class="editor-section">
          <div id="disposeContext" class="dispose-context-card"></div>
        </div>
        <div id="sellFields" class="editor-section hidden">
          <div class="field-grid editor-field-grid">
            <label><span>Sale value</span><input id="sellValueField" type="number" step="0.01" /></label>
          </div>
        </div>
        <div id="tradeFields" class="editor-section hidden">
          <div class="field-grid editor-field-grid">
            <label><span>Your watch value in this deal</span><input id="tradeOutFlow" type="number" step="0.01" /></label>
            <label><span>Incoming watch value</span><input id="tradeInFlow" type="number" step="0.01" /></label>
            <label><span>New watch brand</span><input id="tradeNewBrand" /></label>
            <label><span>New watch model</span><input id="tradeNewModel" /></label>
            <label><span>New watch factory</span><input id="tradeNewFactory" /></label>
            <label><span>New watch reference</span><input id="tradeNewReference" /></label>
            <label class="full-span"><span>New watch notes</span><textarea id="tradeNewNotes" rows="3"></textarea></label>
          </div>
        </div>
        <div class="modal-actions editor-actions">
          <button id="cancelDisposeBtn" type="button" class="ghost-btn editor-secondary-btn">Cancel</button>
          <button id="saveDisposeBtn" type="submit" class="primary-btn editor-primary-btn">Save</button>
        </div>
        <div id="disposeStatus" class="form-status"></div>
      </form>
    </section>
  </div>

  <div id="imageLightbox" class="image-lightbox hidden" aria-hidden="true">
    <div class="image-lightbox-backdrop" data-close-lightbox="true"></div>
    <div class="image-lightbox-card">
      <button id="closeLightboxBtn" class="image-lightbox-close" type="button">×</button>
      <img id="lightboxImage" src="" alt="Expanded watch image" />
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
